<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端午头像定制 · 预售</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
        .hero { text-align: center; padding: 50px 20px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .hero h1 { font-size: 32px; margin-bottom: 10px; }
        .hero p { opacity: 0.9; font-size: 16px; }
        .banner { background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); text-align: center; padding: 18px; font-size: 22px; font-weight: bold; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 16px; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .gallery img:hover { transform: scale(1.05); }
        .section { padding: 24px 16px; }
        .section-title { font-size: 18px; margin-bottom: 16px; color: #f093fb; text-align: center; }
        .packages { display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; }
        .pkg { background: #16161f; border-radius: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; border: 2px solid transparent; transition: border-color 0.3s; cursor: pointer; }
        .pkg:hover { border-color: #667eea; }
        .pkg.selected { border-color: #f5576c; background: #1e1e2a; }
        .pkg-info h3 { font-size: 16px; margin-bottom: 4px; }
        .pkg-info p { color: #888; font-size: 13px; }
        .pkg-price { font-size: 24px; font-weight: bold; color: #f5576c; }
        .buy-btn { display: block; width: calc(100% - 32px); margin: 20px auto; padding: 18px; background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); border: none; border-radius: 14px; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
        .qr-section { text-align: center; padding: 30px 16px; }
        .qr-section img { width: 220px; border-radius: 12px; margin-bottom: 12px; }
        .qr-section p { color: #aaa; font-size: 14px; }
        .steps { background: #16161f; border-radius: 16px; padding: 24px; margin: 16px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .step { display: flex; align-items: center; margin: 14px 0; }
        .step-num { width: 30px; height: 30px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 14px; flex-shrink: 0; }
        .step-text { color: #ccc; font-size: 14px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #16161f; border-radius: 20px; padding: 30px; max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal h2 { text-align: center; margin-bottom: 20px; font-size: 20px; }
        .modal-close { display: block; width: 100%; padding: 14px; background: #333; border: none; border-radius: 10px; color: #fff; font-size: 15px; cursor: pointer; margin-top: 12px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #aaa; font-size: 13px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background: #0a0a0f; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 14px; }
        .form-group textarea { height: 80px; resize: vertical; }
        .success-msg { text-align: center; padding: 30px; display: none; }
        .success-msg.active { display: block; }
        .success-msg .icon { font-size: 60px; margin-bottom: 16px; }
        .success-msg h3 { font-size: 20px; margin-bottom: 8px; color: #4ade80; }
        .success-msg p { color: #888; font-size: 14px; }
        .footer { text-align: center; padding: 30px; color: #555; font-size: 12px; }
        .order-id { background: #0a0a0f; padding: 10px 16px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #667eea; margin: 12px 0; word-break: break-all; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🎨 AI端午头像定制</h1>
        <p>专属卡通头像 · AI生成 · 当天交付</p>
    </div>
    
    <div class="banner">🔥 预售特惠 ¥19.9 起</div>
    
    <div class="gallery">
        <img src="images/cover_1.png" alt="端午节头像1">
        <img src="images/cover_2.png" alt="端午节头像2">
        <img src="images/cover_3.png" alt="儿童节头像1">
        <img src="images/cover_4.png" alt="儿童节头像2">
        <img src="images/cover_5.png" alt="端午节头像3">
        <img src="images/cover_6.png" alt="儿童节头像3">
    </div>
    
    <div class="section">
        <h2 class="section-title">🎁 选择套餐</h2>
        <div class="packages">
            <div class="pkg selected" data-package="single" data-price="19.9" onclick="selectPkg(this)">
                <div class="pkg-info">
                    <h3>👤 单人头像</h3>
                    <p>1个专属卡通头像</p>
                </div>
                <div class="pkg-price">¥19.9</div>
            </div>
            <div class="pkg" data-package="couple" data-price="29.9" onclick="selectPkg(this)">
                <div class="pkg-info">
                    <h3>👫 情侣/双人</h3>
                    <p>2个专属卡通头像</p>
                </div>
                <div class="pkg-price">¥29.9</div>
            </div>
            <div class="pkg" data-package="family" data-price="39.9" onclick="selectPkg(this)">
                <div class="pkg-info">
                    <h3>👨‍👩‍👧 全家福</h3>
                    <p>3-4人专属卡通头像</p>
                </div>
                <div class="pkg-price">¥39.9</div>
            </div>
        </div>
    </div>
    
    <a class="buy-btn" href="weixin://">📱 添加客服微信：dddd9527</a>
    
    <div class="section">
        <h2 class="section-title">📋 定制流程</h2>
        <div class="steps">
            <div class="step"><div class="step-num">1</div><div class="step-text">扫码 / 点击联系微信下单</div></div>
            <div class="step"><div class="step-num">2</div><div class="step-text">付款 ¥19.9 起</div></div>
            <div class="step"><div class="step-num">3</div><div class="step-text">填写头像需求（风格、人物描述）</div></div>
            <div class="step"><div class="step-num">4</div><div class="step-text">AI生成 · 当天交付 · 满意为止</div></div>
        </div>
    </div>
    
    <div class="qr-section">
        <img src="images/wechat_payment_qrcode.jpg" alt="微信联系">
        <p>长按识别二维码添加微信</p>
        <p style="margin-top:8px;color:#f5576c;">微信: dddd9527</p>
    </div>
    

    
    <div class="footer">AI生成 · 当天交付 · 满意为止</div>
    
    <script>
    let selectedPkg = {name: '单人头像', price: 19.9, code: 'single'};
    
    function selectPkg(el) {
        document.querySelectorAll('.pkg').forEach(p => p.classList.remove('selected'));
        el.classList.add('selected');
        selectedPkg = {
            name: el.querySelector('.pkg-info h3').textContent,
            price: el.dataset.price,
            code: el.dataset.package
        };
    }
    </script>
</body>
</html>
