<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 AI端午头像定制 · 当天交付</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
        .lang-bar { display: flex; justify-content: center; gap: 16px; padding: 12px; background: #111; font-size: 13px; }
        .lang-bar a { color: #888; text-decoration: none; padding: 4px 12px; border-radius: 20px; }
        .lang-bar a.active { background: #667eea; color: #fff; }
        .hero { text-align: center; padding: 40px 20px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .hero h1 { font-size: 28px; margin-bottom: 8px; }
        .hero p { opacity: 0.9; font-size: 15px; }
        .banner { background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); text-align: center; padding: 14px; font-size: 20px; font-weight: bold; }
        .tabs { display: flex; background: #111; overflow-x: auto; }
        .tab { flex: 1; min-width: 80px; padding: 12px 8px; text-align: center; color: #666; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab.active { color: #fff; border-color: #667eea; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .gallery img:hover { transform: scale(1.05); }
        .section { padding: 20px 16px; }
        .section-title { font-size: 16px; margin-bottom: 14px; color: #f093fb; text-align: center; }
        .packages { display: flex; flex-direction: column; gap: 10px; max-width: 500px; margin: 0 auto; }
        .pkg { background: #16161f; border-radius: 14px; padding: 16px; display: flex; justify-content: space-between; align-items: center; border: 2px solid transparent; cursor: pointer; }
        .pkg.selected { border-color: #f5576c; }
        .pkg-info h3 { font-size: 15px; margin-bottom: 3px; }
        .pkg-info p { color: #777; font-size: 12px; }
        .pkg-price { font-size: 22px; font-weight: bold; color: #f5576c; }
        .contact-cards { display: flex; flex-direction: column; gap: 12px; max-width: 400px; margin: 0 auto; }
        .contact-card { background: #16161f; border-radius: 14px; padding: 20px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .contact-card:hover { transform: scale(1.02); }
        .contact-card .icon { font-size: 40px; margin-bottom: 10px; }
        .contact-card h3 { font-size: 16px; margin-bottom: 6px; }
        .contact-card p { color: #888; font-size: 13px; }
        .contact-card .qr { width: 180px; margin: 12px auto 0; border-radius: 8px; }
        .or-divider { text-align: center; padding: 16px; color: #555; font-size: 13px; }
        .steps { background: #16161f; border-radius: 14px; padding: 20px; margin: 16px 0; }
        .step { display: flex; align-items: center; margin: 10px 0; }
        .step-num { width: 26px; height: 26px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; margin-right: 12px; flex-shrink: 0; }
        .step-text { color: #ccc; font-size: 13px; }
        .footer { text-align: center; padding: 24px; color: #444; font-size: 12px; }
        .floating-btn { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4); cursor: pointer; text-decoration: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="lang-bar">
        <a href="?lang=zh" class="active" onclick="setLang('zh', event)">中文</a>
        <a href="?lang=en" onclick="setLang('en', event)">English</a>
    </div>
    
    <div class="hero">
        <h1>🎨 AI端午头像定制</h1>
        <p id="hero-sub">专属卡通头像 · AI生成 · 当天交付</p>
    </div>
    
    <div class="banner" id="banner">🔥 预售特惠 ¥19.9 起</div>
    
    <div class="tabs" id="categoryTabs">
        <div class="tab active" data-cat="all" onclick="switchTab('all')">全部</div>
        <div class="tab" data-cat="festival" onclick="switchTab('festival')">端午</div>
        <div class="tab" data-cat="children" onclick="switchTab('children')">儿童节</div>
        <div class="tab" data-cat="couple" onclick="switchTab('couple')">情侣</div>
        <div class="tab" data-cat="family" onclick="switchTab('family')">全家福</div>
        <div class="tab" data-cat="pet" onclick="switchTab('pet')">萌宠</div>
    </div>
    
    <div class="gallery" id="gallery"></div>
    
    <div class="section">
        <h2 class="section-title" id="pkg-title">🎁 选择套餐</h2>
        <div class="packages" id="packages"></div>
    </div>
    
    <div class="section">
        <h2 class="section-title" id="contact-title">📱 联系客服</h2>
        <div class="contact-cards" id="contactSection"></div>
    </div>
    
    <div class="section">
        <h2 class="section-title" id="steps-title">📋 定制流程</h2>
        <div class="steps" id="steps"></div>
    </div>
    
    <div class="footer" id="footer">AI生成 · 当天交付 · 满意为止</div>
    
    <a class="floating-btn" id="floatingBtn" href="weixin://" title="联系客服">💬</a>
    
    <script>
    const lang = new URLSearchParams(window.location.search).get('lang') || 'zh';
    
    const i18n = {
        zh: {
            hero: '专属卡通头像 · AI生成 · 当天交付',
            banner: '🔥 预售特惠 ¥19.9 起',
            pkgTitle: '🎁 选择套餐',
            contactTitle: '📱 联系客服下单',
            stepsTitle: '📋 定制流程',
            footer: 'AI生成 · 当天交付 · 满意为止',
            tabs: { all: '全部', festival: '端午', children: '儿童节', couple: '情侣', family: '全家福', pet: '萌宠' },
            contact: {
                wechat: { title: '微信客服', sub: '长按识别二维码添加' },
                feishu: { title: '飞书客服', sub: '扫码加入群聊' },
                xianyu: { title: '闲鱼下单', sub: '淘宝一键转卖，更安全' }
            },
            steps: [
                '选择套餐并联系客服',
                '微信/支付宝付款 ¥19.9',
                '发送头像需求（风格+描述）',
                'AI生成 · 当天交付 · 满意为止'
            ],
            packages: [
                { name: '👤 单人头像', desc: '1个专属卡通头像', price: '¥19.9', code: 'single' },
                { name: '👫 情侣头像', desc: '2个专属卡通头像', price: '¥29.9', code: 'couple' },
                { name: '👨‍👩‍👧‍👦 全家福', desc: '3-4人专属卡通头像', price: '¥39.9', code: 'family' },
                { name: '🐱 萌宠头像', desc: '1个宠物卡通头像', price: '¥19.9', code: 'pet' }
            ]
        },
        en: {
            hero: 'AI Custom Avatars · Same Day Delivery',
            banner: '🔥 Presale Special: From $2.99',
            pkgTitle: '🎁 Choose Your Package',
            contactTitle: '📱 Contact Us',
            stepsTitle: '📋 How It Works',
            footer: 'AI Generated · Same Day · Satisfaction Guaranteed',
            tabs: { all: 'All', festival: 'Dragon Boat', children: 'Kids', couple: 'Couple', family: 'Family', pet: 'Pet' },
            contact: {
                wechat: { title: 'WeChat', sub: 'Scan to add friend' },
                feishu: { title: 'Feishu Group', sub: 'Join our group chat' },
                fiverr: { title: 'Fiverr Service', sub: 'Order on Fiverr ($2.99)' }
            },
            steps: [
                'Choose package & contact us',
                'Pay via PayPal/WeChat/Alipay',
                'Send your avatar requirements',
                'AI generates · Delivered same day'
            ],
            packages: [
                { name: '👤 Single Avatar', desc: '1 custom cartoon avatar', price: '$2.99', code: 'single' },
                { name: '👫 Couple Avatars', desc: '2 custom cartoon avatars', price: '$4.99', code: 'couple' },
                { name: '👨‍👩‍👧‍👦 Family Pack', desc: '3-4 custom avatars', price: '$6.99', code: 'family' },
                { name: '🐱 Pet Avatar', desc: '1 custom pet cartoon', price: '$2.99', code: 'pet' }
            ]
        }
    };
    
    const images = {
        festival: ['images/cover_1.png', 'images/cover_2.png', 'images/cover_5.png'],
        children: ['images/cover_3.png', 'images/cover_4.png', 'images/cover_6.png'],
        couple: ['images/cover_couple_1.png', 'images/cover_couple_2.png'],
        family: ['images/cover_family_1.png'],
        pet: ['images/cover_pet_1.png', 'images/cover_pet_2.png'],
        western: ['images/cover_western_1.png', 'images/cover_western_2.png']
    };
    
    const allImages = [
        'images/cover_1.png', 'images/cover_2.png', 'images/cover_3.png',
        'images/cover_4.png', 'images/cover_5.png', 'images/cover_6.png',
        'images/cover_couple_1.png', 'images/cover_couple_2.png',
        'images/cover_family_1.png', 'images/cover_pet_1.png', 'images/cover_pet_2.png'
    ];
    
    let currentCat = 'all';
    
    function switchTab(cat) {
        currentCat = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-cat="${cat}"]`).classList.add('active');
        renderGallery();
    }
    
    function renderGallery() {
        const gallery = document.getElementById('gallery');
        let imgs = currentCat === 'all' ? allImages : (images[currentCat] || allImages);
        // Add western images for English
        if (lang === 'en' && currentCat === 'all') {
            imgs = [...allImages, ...images.western];
        }
        gallery.innerHTML = imgs.map(src => `<img src="${src}" loading="lazy" alt="avatar sample">`).join('');
    }
    
    function renderPackages() {
        const t = i18n[lang];
        const pkgContainer = document.getElementById('packages');
        pkgContainer.innerHTML = t.packages.map((p, i) => `
            <div class="pkg ${i === 0 ? 'selected' : ''}" onclick="selectPkg(this)">
                <div class="pkg-info">
                    <h3>${p.name}</h3>
                    <p>${p.desc}</p>
                </div>
                <div class="pkg-price">${p.price}</div>
            </div>
        `).join('');
    }
    
    function renderContact() {
        const t = i18n[lang];
        const section = document.getElementById('contactSection');
        const contacts = lang === 'zh' 
            ? [t.contact.wechat, t.contact.feishu, t.contact.xianyu]
            : [t.contact.wechat, t.contact.fiverr];
        
        const qrcodes = {
            wechat: 'images/wechat_payment_qrcode.jpg',
            feishu: 'images/feishu_group_qrcode.png',
            xianyu: 'images/xianyu_qrcode.png',
            fiverr: 'https://fiverr.com'
        };
        
        section.innerHTML = contacts.map(c => `
            <div class="contact-card">
                <div class="icon">${c === t.contact.wechat ? '💬' : c === t.contact.feishu ? '📱' : c === t.contact.xianyu ? '🛒' : '🌐'}</div>
                <h3>${c.title}</h3>
                <p>${c.sub}</p>
            </div>
        `).join('');
    }
    
    function renderSteps() {
        const t = i18n[lang];
        document.getElementById('steps').innerHTML = t.steps.map((s, i) => `
            <div class="step">
                <div class="step-num">${i + 1}</div>
                <div class="step-text">${s}</div>
            </div>
        `).join('');
    }
    
    function setLang(l, e) {
        if (e) e.preventDefault();
        document.querySelectorAll('.lang-bar a').forEach(a => a.classList.remove('active'));
        document.querySelector(`.lang-bar a[href="?lang=${l}"]`).classList.add('active');
        Object.assign(document.getElementById('hero-sub'), {textContent: i18n[l].hero});
        document.getElementById('banner').textContent = i18n[l].banner;
        document.getElementById('pkg-title').textContent = i18n[l].pkgTitle;
        document.getElementById('contact-title').textContent = i18n[l].contactTitle;
        document.getElementById('steps-title').textContent = i18n[l].stepsTitle;
        document.getElementById('footer').textContent = i18n[l].footer;
        // Update tabs
        const tabs = document.querySelectorAll('.tab');
        const tabKeys = ['all', 'festival', 'children', 'couple', 'family', 'pet'];
        tabs.forEach((tab, i) => tab.textContent = i18n[l].tabs[tabKeys[i]]);
        // Update floating button
        if (l === 'en') {
            document.getElementById('floatingBtn').href = 'https://fiverr.com';
        }
        renderGallery();
        renderPackages();
        renderContact();
        renderSteps();
    }
    
    function selectPkg(el) {
        document.querySelectorAll('.pkg').forEach(p => p.classList.remove('selected'));
        el.classList.add('selected');
    }
    
    // Init
    setLang(lang);
    </script>
</body>
</html>
